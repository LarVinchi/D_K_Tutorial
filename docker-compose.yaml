version: '3.8'

# This block defines common settings so we don't repeat ourselves
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  environment:
    # Tell Airflow to use our Postgres container
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    # This is the environment variable our etl_pipeline.py looks for!
    - DATABASE_URL=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
  volumes:
    # Mount our local directories into the container so we can edit code without rebuilding
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
  depends_on:
    postgres:
      condition: service_healthy

services:
  # 1. The Database
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # 2. Database Initialization & User Creation
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create -r Admin -u admin -p admin -e admin@example.com -f Admin -l User"
    restart: on-failure

  # 3. The Airflow UI
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # 4. The Airflow Task Trigger Engine
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully